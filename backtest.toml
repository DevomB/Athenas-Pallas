# Copy to backtest.toml and set [backtest].data to a CSV you fetched into data/

[instrument]
exchange = "alpha-vantage"
symbol = "BTCUSDT"
asset_class = "crypto"

[backtest]
data = "data/BTCUSDT_live.csv"
data_format = "ohlcv"
fee_bps = 10
slippage_bps = 5
half_spread_bps = 5
periods_per_year = 365.0
strategy = "simple_sma"
python = "python"
output = "target/backtest_report.json"

[[balances]]
asset = "USDT"
amount = "10000"
