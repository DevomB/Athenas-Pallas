# Publishes `athenas-pallas` when the workspace version is not yet on crates.io.
# Trigger: push to main/master touching the root Cargo.toml or `athenas-pallas/`.
#
# Uses crates.io trusted publishing (OIDC). See RELEASING.md for one-time setup.
# First-ever publish still needs a normal API token (local `cargo publish` or a
# temporary workflow secret); after that, remove the secret and rely on OIDC.

name: Publish crates.io

on:
  push:
    branches: [main, master]
    paths:
      - "Cargo.toml"
      - "athenas-pallas/**"

concurrency:
  group: publish-crates-io-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for rust-lang/crates-io-auth-action (OIDC)
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Read athenas-pallas version from workspace
        id: meta
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name=="athenas-pallas") | .version')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing only if $VERSION is not already on crates.io."

      - name: Check if version already exists on crates.io
        id: crates
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          code=$(curl -sS -o /dev/null -w "%{http_code}" "https://crates.io/api/v1/crates/athenas-pallas/${VERSION}")
          echo "crates.io HTTP ${code} for athenas-pallas ${VERSION}"
          if [ "$code" = "200" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate with crates.io (trusted publishing)
        id: auth
        if: steps.crates.outputs.exists == 'false'
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish to crates.io
        if: steps.crates.outputs.exists == 'false'
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish -p athenas-pallas
