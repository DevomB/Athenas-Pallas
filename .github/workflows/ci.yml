name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt-clippy-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: test athenas-pallas
        run: cargo test -p athenas-pallas
      - name: build tools
        run: cargo build -p athenas-pallas-tools --release
      - name: python SMA golden
        run: cargo test -p athenas-pallas --test external_strategy_golden -- --ignored
      - name: python SDK tests
        run: python trading/_sdk/python/test_pallas_strategy.py
      - name: build examples
        run: cargo build -p athenas-pallas --examples

  cpp-golden:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install CMake
        run: sudo apt-get update && sudo apt-get install -y cmake g++
      - name: C++ SMA golden
        run: cargo test -p athenas-pallas --test cpp_strategy_golden -- --ignored

  bench-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Bench noop amortized
        run: cargo bench -p athenas-pallas --bench backtest_hotpath -- --noplot noop_100k_amortized
      - name: Regression gate (compare against committed ceiling)
        run: |
          EST=target/criterion/noop_100k_amortized/new/estimates.json
          CEIL_MS=$(jq -r '.noop_100k_amortized.ceiling_ms' docs/bench_baseline.json)
          MEAN_NS=$(jq -r '.mean.point_estimate' "$EST")
          MEAN_MS=$(awk "BEGIN { printf \"%.2f\", $MEAN_NS / 1000000 }")
          echo "noop_100k_amortized mean: ${MEAN_MS} ms (ceiling ${CEIL_MS} ms)"
          awk "BEGIN { exit !($MEAN_MS <= $CEIL_MS) }" || {
            echo "::error::Benchmark regression: ${MEAN_MS} ms exceeds ceiling ${CEIL_MS} ms"
            exit 1
          }

  test-workspace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test workspace
        run: cargo test --workspace
